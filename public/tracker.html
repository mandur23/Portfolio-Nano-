<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Beacon 통합 관제</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #0a0a0f;
        color: #f0f0f5;
      }

      .app {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .topbar {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 16px;
        background: #13131a;
        border-bottom: 1px solid #1e1e2a;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 15px;
        font-weight: 600;
        color: #f0f0f5;
        white-space: nowrap;
      }

      .kpis {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .kpi {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        background: #0a0a0f;
        border: 1px solid #1e1e2a;
        color: #8b8b9e;
        font-size: 12px;
        padding: 4px 10px;
        border-radius: 8px;
        white-space: nowrap;
      }

      .kpi--active {
        border-color: #1e2a1e;
        color: #4ade80;
      }

      .kpi--exit {
        border-color: #2a1e1e;
        color: #fca5a5;
      }

      .conn {
        margin-left: auto;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #8b8b9e;
        white-space: nowrap;
      }

      .conn__dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #64748b;
        display: inline-block;
      }

      .conn.is-online {
        color: #4ade80;
      }

      .conn.is-online .conn__dot {
        background: #22c55e;
      }

      .conn.is-offline {
        color: #fca5a5;
      }

      .conn.is-offline .conn__dot {
        background: #ef4444;
      }

      .body {
        flex: 1;
        display: flex;
        min-height: 0;
      }

      .sidebar {
        width: 268px;
        flex-shrink: 0;
        background: #0d0d13;
        border-right: 1px solid #1e1e2a;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .panel-title {
        padding: 10px 12px;
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #64748b;
        border-bottom: 1px solid #1e1e2a;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .panel-title__count {
        color: #8b8b9e;
        font-weight: 400;
      }

      .device-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
      }

      .device {
        display: block;
        width: 100%;
        text-align: left;
        background: #13131a;
        border: 1px solid #1e1e2a;
        border-left: 3px solid #1e1e2a;
        border-radius: 8px;
        padding: 10px 11px;
        margin-bottom: 8px;
        cursor: pointer;
        font: inherit;
        color: inherit;
        transition: border-color 0.15s ease, background 0.15s ease;
      }

      .device:hover {
        border-color: #2b3a55;
      }

      .device.is-active {
        border-color: #2b3a55;
        border-left-color: #60a5fa;
      }

      .device.is-offline {
        background: #0f0f15;
        opacity: 0.72;
      }

      .device__head {
        display: flex;
        align-items: center;
        gap: 7px;
        margin-bottom: 7px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
        flex-shrink: 0;
      }

      .device__name {
        font-size: 13px;
        font-weight: 600;
        color: #f0f0f5;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .device__focus {
        margin-left: auto;
        font-size: 11px;
        color: #64748b;
        flex-shrink: 0;
      }

      .device.is-active .device__focus,
      .device:hover .device__focus {
        color: #60a5fa;
      }

      .device__meta {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #8b8b9e;
        font-size: 11px;
      }

      .batt {
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }

      .batt__shell {
        position: relative;
        width: 22px;
        height: 11px;
        border: 1px solid #3a3a4a;
        border-radius: 2px;
        padding: 1px;
      }

      .batt__shell::after {
        content: '';
        position: absolute;
        right: -3px;
        top: 3px;
        width: 2px;
        height: 5px;
        background: #3a3a4a;
        border-radius: 0 1px 1px 0;
      }

      .batt__fill {
        display: block;
        height: 100%;
        border-radius: 1px;
      }

      .exit-section {
        flex-shrink: 0;
        border-top: 1px solid #1e1e2a;
      }

      .exit-list {
        padding: 0 12px 12px;
        max-height: 132px;
        overflow-y: auto;
      }

      .exit-item {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 5px 0;
        color: #fca5a5;
        font-size: 11.5px;
        line-height: 1.5;
      }

      .exit-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #ef4444;
        flex-shrink: 0;
      }

      .empty {
        margin: 14px 8px;
        color: #64748b;
        font-size: 12px;
      }

      .map-wrap {
        flex: 1;
        min-width: 0;
        position: relative;
      }

      #map {
        position: absolute;
        inset: 0;
      }

      .leaflet-popup-content-wrapper {
        background: #13131a;
        color: #f0f0f5;
        border: 1px solid #1e1e2a;
        border-radius: 12px;
      }

      .leaflet-popup-tip {
        background: #13131a;
      }

      .leaflet-popup-content {
        margin: 12px 14px;
        min-width: 220px;
      }

      .beacon-popup h3 {
        margin: 0 0 10px;
        font-size: 0.95rem;
        color: #60a5fa;
      }

      .beacon-popup dl {
        margin: 0;
        display: grid;
        gap: 8px;
      }

      .beacon-popup div {
        display: grid;
        gap: 2px;
      }

      .beacon-popup dt {
        font-size: 0.68rem;
        color: #8b8b9e;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .beacon-popup dd {
        margin: 0;
        font-size: 0.85rem;
        word-break: break-word;
      }

      @media (max-width: 640px) {
        .body {
          flex-direction: column;
        }

        .sidebar {
          width: 100%;
          max-height: 44%;
          border-right: none;
          border-bottom: 1px solid #1e1e2a;
        }

        .map-wrap {
          flex: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4.93 19.07a10 10 0 0 1 0-14.14M7.76 16.24a6 6 0 0 1 0-8.48M19.07 4.93a10 10 0 0 1 0 14.14M16.24 7.76a6 6 0 0 1 0 8.48" />
            <circle cx="12" cy="12" r="1.6" fill="#60a5fa" stroke="none" />
          </svg>
          <span>Beacon 통합 관제</span>
        </div>
        <div class="kpis">
          <span class="kpi kpi--active" id="kpi-active">활성 0</span>
          <span class="kpi kpi--exit" id="kpi-exit" hidden>종료 0</span>
          <span class="kpi" id="kpi-time">—</span>
        </div>
        <span class="conn" id="conn"><span class="conn__dot"></span><span id="conn-text">연결 중…</span></span>
      </header>

      <div class="body">
        <aside class="sidebar">
          <div class="panel-title">기기 목록 <span class="panel-title__count" id="device-count"></span></div>
          <div class="device-list" id="device-list">
            <p class="empty">대기 중인 기기가 없습니다</p>
          </div>
          <section class="exit-section" id="exit-section" hidden>
            <div class="panel-title">종료 이벤트</div>
            <div class="exit-list" id="exit-list"></div>
          </section>
        </aside>

        <div class="map-wrap">
          <div id="map"></div>
        </div>
      </div>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      const kpiActiveEl = document.getElementById('kpi-active');
      const kpiExitEl = document.getElementById('kpi-exit');
      const kpiTimeEl = document.getElementById('kpi-time');
      const connEl = document.getElementById('conn');
      const connTextEl = document.getElementById('conn-text');
      const deviceListEl = document.getElementById('device-list');
      const deviceCountEl = document.getElementById('device-count');
      const exitSectionEl = document.getElementById('exit-section');
      const exitListEl = document.getElementById('exit-list');

      const markers = new Map();
      let map = null;
      let refreshTimer = null;
      let initialViewSet = false;
      let userInteracted = false;
      let firstRefresh = true;
      let selectedId = null;
      const seenEvents = new Set();

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (c) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;',
        }[c]));
      }

      function invalidateMapSize() {
        if (!map) return;
        map.invalidateSize({ animate: false });
      }

      function destroyMap() {
        if (refreshTimer) {
          clearInterval(refreshTimer);
          refreshTimer = null;
        }
        if (map) {
          map.remove();
          map = null;
        }
        markers.clear();
        initialViewSet = false;
        userInteracted = false;
      }

      function initMap() {
        const container = document.getElementById('map');
        if (container) container.innerHTML = '';

        map = L.map('map', { zoomControl: true }).setView([36.5, 127.9], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '&copy; OpenStreetMap',
          maxZoom: 19,
        }).addTo(map);

        map.on('zoomstart', () => {
          userInteracted = true;
        });
        map.on('dragstart', () => {
          userInteracted = true;
        });
      }

      function formatTime(iso) {
        try {
          return new Date(iso).toLocaleString('ko-KR');
        } catch {
          return iso;
        }
      }

      function relativeTime(iso) {
        const diff = Date.now() - new Date(iso).getTime();
        if (!Number.isFinite(diff)) return '—';
        if (diff < 10000) return '방금';
        if (diff < 60000) return Math.floor(diff / 1000) + '초 전';
        if (diff < 3600000) return Math.floor(diff / 60000) + '분 전';
        return Math.floor(diff / 3600000) + '시간 전';
      }

      function deviceStatus(beacon) {
        const age = Date.now() - new Date(beacon.updatedAt).getTime();
        if (age < 30000) return { key: 'online', label: '온라인', color: '#22c55e' };
        if (age < 180000) return { key: 'idle', label: '지연', color: '#fbbf24' };
        return { key: 'offline', label: '오프라인', color: '#64748b' };
      }

      function batteryHtml(battery) {
        if (battery == null || !Number.isFinite(Number(battery))) {
          return '<span class="batt"><span class="batt__shell"></span><span>—</span></span>';
        }
        const pct = Math.max(0, Math.min(100, Math.round(Number(battery))));
        const color = pct <= 20 ? '#fca5a5' : pct <= 50 ? '#fbbf24' : '#4ade80';
        return (
          '<span class="batt"><span class="batt__shell">' +
          '<span class="batt__fill" style="width:' + pct + '%;background:' + color + '"></span>' +
          '</span><span>' + pct + '%</span></span>'
        );
      }

      function eventKey(event) {
        return `${event.id}:${event.at}`;
      }

      function popupHtml(beacon) {
        return `
          <div class="beacon-popup">
            <h3>${escapeHtml(beacon.device)}</h3>
            <dl>
              <div><dt>OS</dt><dd>${escapeHtml(beacon.os)}</dd></div>
              <div><dt>모델</dt><dd>${escapeHtml(beacon.model ?? '—')}</dd></div>
              <div><dt>제조사</dt><dd>${escapeHtml(beacon.manufacturer ?? '—')}</dd></div>
              <div><dt>앱 버전</dt><dd>${escapeHtml(beacon.appVersion ?? '—')}</dd></div>
              <div><dt>배터리</dt><dd>${beacon.battery != null ? escapeHtml(beacon.battery) + '%' : '—'}</dd></div>
              <div><dt>정확도</dt><dd>${beacon.accuracy != null ? '±' + Math.round(beacon.accuracy) + 'm' : '—'}</dd></div>
              <div><dt>좌표</dt><dd>${beacon.lat.toFixed(6)}, ${beacon.lng.toFixed(6)}</dd></div>
              <div><dt>갱신</dt><dd>${formatTime(beacon.updatedAt)}</dd></div>
            </dl>
          </div>
        `;
      }

      function removeMarkerById(id) {
        const marker = markers.get(id);
        if (!marker || !map) return;
        map.removeLayer(marker);
        markers.delete(id);
      }

      function upsertMarker(beacon) {
        const latLng = [beacon.lat, beacon.lng];
        const existing = markers.get(beacon.id);

        if (existing) {
          existing.setLatLng(latLng);
          existing.setPopupContent(popupHtml(beacon));
          return;
        }

        const marker = L.circleMarker(latLng, {
          radius: 9,
          fillColor: '#3b82f6',
          color: '#fff',
          weight: 2,
          fillOpacity: 0.95,
        })
          .bindPopup(popupHtml(beacon))
          .addTo(map);

        marker.on('click', () => {
          selectedId = beacon.id;
          marker.openPopup();
          highlightActiveCard();
        });
        markers.set(beacon.id, marker);
      }

      function removeStale(activeIds) {
        for (const [id, marker] of markers.entries()) {
          if (!activeIds.has(id)) {
            map.removeLayer(marker);
            markers.delete(id);
          }
        }
      }

      function fitInitialView(beacons) {
        if (initialViewSet || userInteracted || beacons.length === 0) return;

        if (beacons.length === 1) {
          map.setView([beacons[0].lat, beacons[0].lng], 14);
        } else {
          const group = L.featureGroup(Array.from(markers.values()));
          map.fitBounds(group.getBounds().pad(0.15));
        }
        initialViewSet = true;
      }

      function focusDevice(id) {
        const marker = markers.get(id);
        if (!marker || !map) return;
        userInteracted = true;
        map.flyTo(marker.getLatLng(), Math.max(map.getZoom() || 7, 15), { duration: 0.6 });
        marker.openPopup();
      }

      function highlightActiveCard() {
        deviceListEl.querySelectorAll('.device').forEach((el) => {
          el.classList.toggle('is-active', el.getAttribute('data-id') === selectedId);
        });
      }

      function renderDeviceList(beacons) {
        deviceCountEl.textContent = beacons.length ? `${beacons.length}대` : '';

        if (beacons.length === 0) {
          deviceListEl.innerHTML = '<p class="empty">대기 중인 기기가 없습니다</p>';
          return;
        }

        const sorted = beacons
          .slice()
          .sort((a, b) => new Date(b.updatedAt).getTime() - new Date(a.updatedAt).getTime());

        deviceListEl.innerHTML = sorted
          .map((beacon) => {
            const status = deviceStatus(beacon);
            const active = beacon.id === selectedId ? ' is-active' : '';
            const offline = status.key === 'offline' ? ' is-offline' : '';
            return `
              <button type="button" class="device${active}${offline}" data-id="${escapeHtml(beacon.id)}">
                <div class="device__head">
                  <span class="dot" style="background:${status.color}"></span>
                  <span class="device__name">${escapeHtml(beacon.device)}</span>
                  <span class="device__focus">집중 ›</span>
                </div>
                <div class="device__meta">
                  ${batteryHtml(beacon.battery)}
                  <span>OS ${escapeHtml(beacon.os)}</span>
                  <span>${relativeTime(beacon.updatedAt)}</span>
                </div>
              </button>
            `;
          })
          .join('');
      }

      function renderExitList(exitEvents) {
        if (exitEvents.length === 0) {
          exitSectionEl.hidden = true;
          exitListEl.innerHTML = '';
          return;
        }

        exitSectionEl.hidden = false;
        exitListEl.innerHTML = exitEvents
          .slice(0, 8)
          .map(
            (event) =>
              `<div class="exit-item"><span class="exit-dot"></span><span>${escapeHtml(
                event.device || event.id
              )} · ${formatTime(event.at)}</span></div>`
          )
          .join('');
      }

      function handleExitEvents(events, notify) {
        const exitEvents = events.filter((event) => event.type === 'exit');
        renderExitList(exitEvents);

        exitEvents.forEach((event) => {
          if (notify && !seenEvents.has(eventKey(event))) {
            removeMarkerById(event.id);
          }
          seenEvents.add(eventKey(event));
        });
      }

      function setConnection(state, text) {
        connEl.classList.remove('is-online', 'is-offline');
        if (state) connEl.classList.add(state);
        connTextEl.textContent = text;
      }

      function parseBeaconResponse(data) {
        if (Array.isArray(data)) {
          return { beacons: data, events: [] };
        }
        if (data && Array.isArray(data.beacons)) {
          return {
            beacons: data.beacons,
            events: Array.isArray(data.events) ? data.events : [],
          };
        }
        throw new Error('Invalid response');
      }

      async function refresh() {
        try {
          const response = await fetch('/api/beacons', { cache: 'no-store' });
          const { beacons, events } = parseBeaconResponse(await response.json());
          const notify = !firstRefresh;
          if (firstRefresh) firstRefresh = false;

          handleExitEvents(events, notify);

          const activeIds = new Set();
          beacons.forEach((beacon) => {
            activeIds.add(beacon.id);
            upsertMarker(beacon);
          });
          removeStale(activeIds);
          renderDeviceList(beacons);
          fitInitialView(beacons);

          const exitCount = events.filter((event) => event.type === 'exit').length;
          kpiActiveEl.textContent = `활성 ${beacons.length}`;
          if (exitCount > 0) {
            kpiExitEl.hidden = false;
            kpiExitEl.textContent = `종료 ${exitCount}`;
          } else {
            kpiExitEl.hidden = true;
          }
          kpiTimeEl.textContent = new Date().toLocaleTimeString('ko-KR');
          setConnection('is-online', '연결됨');
        } catch {
          setConnection('is-offline', '연결 끊김');
        }
      }

      deviceListEl.addEventListener('click', (event) => {
        const card = event.target.closest('.device');
        if (!card) return;
        const id = card.getAttribute('data-id');
        if (!id) return;
        selectedId = id;
        highlightActiveCard();
        focusDevice(id);
      });

      function startTracker() {
        destroyMap();
        seenEvents.clear();
        firstRefresh = true;
        selectedId = null;
        initMap();
        setConnection(null, '연결 중…');
        refresh();
        refreshTimer = setInterval(refresh, 1000);
        requestAnimationFrame(invalidateMapSize);
        setTimeout(invalidateMapSize, 150);
      }

      window.addEventListener('pageshow', (event) => {
        if (event.persisted) {
          startTracker();
        }
      });

      window.addEventListener('focus', () => {
        invalidateMapSize();
      });

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          invalidateMapSize();
          refresh();
        }
      });

      startTracker();
    </script>
  </body>
</html>
