<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Beacon Monitor</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #0a0a0f;
        color: #f0f0f5;
      }

      #map {
        width: 100%;
        height: 100%;
      }

      .leaflet-popup-content-wrapper {
        background: #13131a;
        color: #f0f0f5;
        border: 1px solid #1e1e2a;
        border-radius: 12px;
      }

      .leaflet-popup-tip {
        background: #13131a;
      }

      .leaflet-popup-content {
        margin: 12px 14px;
        min-width: 220px;
      }

      .beacon-popup h3 {
        margin: 0 0 10px;
        font-size: 0.95rem;
        color: #60a5fa;
      }

      .beacon-popup dl {
        margin: 0;
        display: grid;
        gap: 8px;
      }

      .beacon-popup div {
        display: grid;
        gap: 2px;
      }

      .beacon-popup dt {
        font-size: 0.68rem;
        color: #8b8b9e;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .beacon-popup dd {
        margin: 0;
        font-size: 0.85rem;
        word-break: break-word;
      }

      .status-bar {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 1000;
        padding: 8px 12px;
        border-radius: 8px;
        background: rgba(19, 19, 26, 0.92);
        border: 1px solid #1e1e2a;
        font-size: 0.8rem;
        color: #8b8b9e;
      }

      .exit-toast {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 1001;
        padding: 10px 14px;
        border-radius: 8px;
        background: rgba(127, 29, 29, 0.94);
        border: 1px solid #ef4444;
        font-size: 0.82rem;
        color: #fecaca;
        max-width: min(360px, calc(100vw - 24px));
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        animation: toastIn 0.25s ease;
      }

      .event-log {
        position: fixed;
        bottom: 12px;
        left: 12px;
        z-index: 1000;
        width: min(320px, calc(100vw - 24px));
        max-height: 160px;
        overflow-y: auto;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(19, 19, 26, 0.92);
        border: 1px solid #1e1e2a;
        font-size: 0.75rem;
        color: #8b8b9e;
      }

      .event-log__title {
        margin: 0 0 8px;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #64748b;
      }

      .event-log__item {
        padding: 6px 0;
        border-top: 1px solid #1e1e2a;
        color: #fca5a5;
        line-height: 1.45;
      }

      .event-log__item:first-of-type {
        border-top: none;
        padding-top: 0;
      }

      .event-log__empty {
        margin: 0;
        color: #64748b;
      }

      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="status" class="status-bar">연결 중…</div>
    <aside id="event-log" class="event-log" hidden>
      <p class="event-log__title">종료 이벤트</p>
      <div id="event-log-list"></div>
    </aside>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      const statusEl = document.getElementById('status');
      const eventLogEl = document.getElementById('event-log');
      const eventLogListEl = document.getElementById('event-log-list');
      const markers = new Map();
      let map = null;
      let refreshTimer = null;
      let initialViewSet = false;
      let userInteracted = false;
      let firstRefresh = true;
      const seenEvents = new Set();
      let exitToastTimer = null;
      let exitToastEl = null;

      function invalidateMapSize() {
        if (!map) return;
        map.invalidateSize({ animate: false });
      }

      function destroyMap() {
        if (refreshTimer) {
          clearInterval(refreshTimer);
          refreshTimer = null;
        }
        if (map) {
          map.remove();
          map = null;
        }
        markers.clear();
        initialViewSet = false;
        userInteracted = false;
      }

      function initMap() {
        const container = document.getElementById('map');
        if (container) container.innerHTML = '';

        map = L.map('map', { zoomControl: true }).setView([36.5, 127.9], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '&copy; OpenStreetMap',
          maxZoom: 19,
        }).addTo(map);

        map.on('zoomstart', () => {
          userInteracted = true;
        });
        map.on('dragstart', () => {
          userInteracted = true;
        });
      }

      function formatTime(iso) {
        try {
          return new Date(iso).toLocaleString('ko-KR');
        } catch {
          return iso;
        }
      }

      function eventKey(event) {
        return `${event.id}:${event.at}`;
      }

      function popupHtml(beacon) {
        return `
          <div class="beacon-popup">
            <h3>${beacon.device}</h3>
            <dl>
              <div><dt>OS</dt><dd>${beacon.os}</dd></div>
              <div><dt>모델</dt><dd>${beacon.model ?? '—'}</dd></div>
              <div><dt>제조사</dt><dd>${beacon.manufacturer ?? '—'}</dd></div>
              <div><dt>앱 버전</dt><dd>${beacon.appVersion ?? '—'}</dd></div>
              <div><dt>배터리</dt><dd>${beacon.battery != null ? beacon.battery + '%' : '—'}</dd></div>
              <div><dt>정확도</dt><dd>${beacon.accuracy != null ? '±' + Math.round(beacon.accuracy) + 'm' : '—'}</dd></div>
              <div><dt>좌표</dt><dd>${beacon.lat.toFixed(6)}, ${beacon.lng.toFixed(6)}</dd></div>
              <div><dt>갱신</dt><dd>${formatTime(beacon.updatedAt)}</dd></div>
            </dl>
          </div>
        `;
      }

      function removeMarkerById(id) {
        const marker = markers.get(id);
        if (!marker || !map) return;
        map.removeLayer(marker);
        markers.delete(id);
      }

      function upsertMarker(beacon) {
        const latLng = [beacon.lat, beacon.lng];
        const existing = markers.get(beacon.id);

        if (existing) {
          existing.setLatLng(latLng);
          existing.setPopupContent(popupHtml(beacon));
          return;
        }

        const marker = L.circleMarker(latLng, {
          radius: 9,
          fillColor: '#3b82f6',
          color: '#fff',
          weight: 2,
          fillOpacity: 0.95,
        })
          .bindPopup(popupHtml(beacon))
          .addTo(map);

        marker.on('click', () => marker.openPopup());
        markers.set(beacon.id, marker);
      }

      function removeStale(activeIds) {
        for (const [id, marker] of markers.entries()) {
          if (!activeIds.has(id)) {
            map.removeLayer(marker);
            markers.delete(id);
          }
        }
      }

      function fitInitialView(beacons) {
        if (initialViewSet || userInteracted || beacons.length === 0) return;

        if (beacons.length === 1) {
          map.setView([beacons[0].lat, beacons[0].lng], 14);
        } else {
          const group = L.featureGroup(Array.from(markers.values()));
          map.fitBounds(group.getBounds().pad(0.15));
        }
        initialViewSet = true;
      }

      function showExitToast(event) {
        const key = eventKey(event);
        if (seenEvents.has(key)) return;
        seenEvents.add(key);

        const label = event.device || event.id;
        if (exitToastEl) exitToastEl.remove();
        exitToastEl = document.createElement('div');
        exitToastEl.className = 'exit-toast';
        exitToastEl.textContent = `${label} — ${event.message || '앱 종료'}`;
        document.body.appendChild(exitToastEl);

        if (exitToastTimer) clearTimeout(exitToastTimer);
        exitToastTimer = setTimeout(() => {
          exitToastEl?.remove();
          exitToastEl = null;
        }, 6000);
      }

      function renderEventLog(exitEvents) {
        if (exitEvents.length === 0) {
          eventLogEl.hidden = true;
          eventLogListEl.innerHTML = '';
          return;
        }

        eventLogEl.hidden = false;
        eventLogListEl.innerHTML = exitEvents
          .slice(0, 8)
          .map(
            (event) =>
              `<div class="event-log__item">${event.device || event.id} · ${formatTime(event.at)}</div>`
          )
          .join('');
      }

      function handleExitEvents(events, notify) {
        const exitEvents = events.filter((event) => event.type === 'exit');
        renderEventLog(exitEvents);

        if (!notify) {
          exitEvents.forEach((event) => seenEvents.add(eventKey(event)));
          return;
        }

        exitEvents.forEach((event) => {
          showExitToast(event);
          removeMarkerById(event.id);
        });
      }

      function parseBeaconResponse(data) {
        if (Array.isArray(data)) {
          return { beacons: data, events: [] };
        }
        if (data && Array.isArray(data.beacons)) {
          return {
            beacons: data.beacons,
            events: Array.isArray(data.events) ? data.events : [],
          };
        }
        throw new Error('Invalid response');
      }

      async function refresh() {
        try {
          const response = await fetch('/api/beacons', { cache: 'no-store' });
          const { beacons, events } = parseBeaconResponse(await response.json());
          const notify = !firstRefresh;
          if (firstRefresh) firstRefresh = false;

          handleExitEvents(events, notify);

          const exitCount = events.filter((event) => event.type === 'exit').length;
          statusEl.textContent = `활성 ${beacons.length}대${
            exitCount > 0 ? ` · 종료 ${exitCount}건` : ''
          } · ${new Date().toLocaleTimeString('ko-KR')}`;

          const activeIds = new Set();
          beacons.forEach((beacon) => {
            activeIds.add(beacon.id);
            upsertMarker(beacon);
          });
          removeStale(activeIds);
          fitInitialView(beacons);
        } catch {
          statusEl.textContent = '데이터를 불러오지 못했습니다';
        }
      }

      function startTracker() {
        destroyMap();
        seenEvents.clear();
        firstRefresh = true;
        if (exitToastEl) {
          exitToastEl.remove();
          exitToastEl = null;
        }
        initMap();
        statusEl.textContent = '연결 중…';
        refresh();
        refreshTimer = setInterval(refresh, 5000);
        requestAnimationFrame(invalidateMapSize);
        setTimeout(invalidateMapSize, 150);
      }

      window.addEventListener('pageshow', (event) => {
        if (event.persisted) {
          startTracker();
        }
      });

      window.addEventListener('focus', () => {
        invalidateMapSize();
      });

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          invalidateMapSize();
          refresh();
        }
      });

      startTracker();
    </script>
  </body>
</html>
